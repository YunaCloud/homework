name: C++ nlohmann/json Auto Test

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master
    paths:
      - "**.cpp"
      - "**.cc"
      - "**.cxx"
      - "**.h"
      - "**.hpp"
      - "CMakeLists.txt"
      - ".github/workflows/cpp-ci.yml"

permissions:
  contents: read

concurrency:
  group: cpp-json-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and run GoogleTest
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build tests
        run: |
          cmake --build build --parallel

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure
